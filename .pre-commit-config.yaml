repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
      - id: mypy-check
        name: mypy strict
        entry: uv run mypy src tests
        language: system
        pass_filenames: false
